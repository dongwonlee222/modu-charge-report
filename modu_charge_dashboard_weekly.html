<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모두의충전 주간 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --paper: #f8f8f3;
      --bg: #eef3ec;
      --panel: #ffffff;
      --ink: #18261d;
      --muted: #647067;
      --line: #d7ddd4;
      --accent: #165d4a;
      --accent-soft: #d8efe5;
      --shadow: 0 18px 40px rgba(24, 38, 29, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 28px 18px 60px;
      color: var(--ink);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(22, 93, 74, 0.12), transparent 24%),
        linear-gradient(180deg, #f9fbf8 0%, #edf3ee 100%);
    }
    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-flex;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }
    h1 { margin: 14px 0 8px; font-size: 34px; line-height: 1.15; }
    .lead, .meta { color: var(--muted); font-size: 14px; line-height: 1.7; }
    .meta {
      margin-top: 18px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(135deg, #f4fbf6 0%, #fffdfa 100%);
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 18px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
    }
    .controls label {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
    }
    .controls select {
      min-width: 140px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }
    .controls .hint {
      color: var(--muted);
      font-size: 13px;
    }
    .nav {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .nav a {
      padding: 10px 14px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--ink);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .section-title { margin: 30px 0 14px; font-size: 22px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(185px, 1fr));
      gap: 14px;
    }
    .card {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: 0 10px 24px rgba(24, 38, 29, 0.05);
    }
    .label { color: var(--muted); font-size: 13px; }
    .value { margin-top: 8px; font-size: 28px; font-weight: 800; line-height: 1.15; }
    .sub { margin-top: 8px; color: var(--muted); font-size: 13px; }
    .chart-wrap {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      margin-top: 18px;
    }
    .chart-wrap h3 { margin: 0 0 8px; font-size: 18px; }
    .chart-caption { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
    .chart-stage { position: relative; width: 100%; height: 320px; max-height: 320px; }
    canvas { width: 100% !important; height: 100% !important; display: block; }
    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .legend span { display: inline-flex; align-items: center; gap: 8px; }
    .swatch { width: 10px; height: 10px; border-radius: 999px; }
    .year-details {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }
    .year-details details {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fafcf9;
      overflow: hidden;
    }
    .year-details summary {
      cursor: pointer;
      list-style: none;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 800;
      color: var(--ink);
      background: #f6faf6;
    }
    .year-details summary::-webkit-details-marker {
      display: none;
    }
    .year-table-wrap {
      padding: 0 12px 12px;
    }
    .mini-table {
      margin-top: 8px;
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .mini-table th,
    .mini-table td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: nowrap;
    }
    .mini-table th:first-child,
    .mini-table td:first-child,
    .mini-table th:nth-child(2),
    .mini-table td:nth-child(2) {
      text-align: left;
    }
    .mini-table tr:last-child td {
      border-bottom: 0;
    }
    .month-panel {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(24, 38, 29, 0.05);
    }
    .month-panel h3 {
      margin: 0 0 6px;
      font-size: 18px;
    }
    .month-panel .month-meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
    }
    .month-panel table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .month-panel th, .month-panel td {
      padding: 9px 8px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: nowrap;
    }
    .month-panel th:first-child, .month-panel td:first-child,
    .month-panel th:nth-child(2), .month-panel td:nth-child(2) {
      text-align: left;
    }
    .month-panel tr:last-child td {
      border-bottom: 0;
    }
    @media (max-width: 1080px) {
      .month-table-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">Weekly Dashboard</div>
    <h1>모두의충전 주간 대시보드</h1>
    <p class="lead">최근 주차 흐름을 빠르게 점검하는 화면입니다.</p>
    <div class="nav">
      <a href="./modu_charge_dashboard.html">대시보드 홈</a>
      <a href="./modu_charge_dashboard_monthly.html">월간 대시보드</a>
    </div>
    <div class="meta" id="meta"></div>
    <div class="controls">
      <label for="yearSelect">연도</label>
      <select id="yearSelect"></select>
      <label for="monthSelect">월</label>
      <select id="monthSelect"></select>
      <div class="hint" id="selectionHint"></div>
    </div>

    <section>
      <h2 class="section-title">최신 주간 요약</h2>
      <div class="grid" id="summaryGrid"></div>
    </section>

    <section>
      <h2 class="section-title">선택 월 주간 테이블</h2>
      <div class="chart-wrap">
        <h3>선택 월 주간 흐름</h3>
        <div class="legend" id="weeklyLegend"></div>
        <div class="chart-caption">선택한 월의 주차별 원거래 금액, 매출, 사용 포인트 흐름입니다.</div>
        <div class="chart-stage"><canvas id="weeklyMonthChart"></canvas></div>
        <div class="year-details" id="monthTables"></div>
      </div>
    </section>
  </main>

  <script src="./modu_charge_dashboard_data.js?v=20260401-2023grossfix"></script>
  <script>
    const data = window.MODU_CHARGE_DASHBOARD_DATA;
    const chartRegistry = {};
    function formatNumber(value, digits = 0) {
      if (value === null || value === undefined || Number.isNaN(value)) return "-";
      return Number(value).toLocaleString("ko-KR", { maximumFractionDigits: digits, minimumFractionDigits: digits });
    }

    function formatDateLabel(value) {
      if (!value) return "-";
      const cleaned = String(value).split("T")[0];
      const [year, month, day] = cleaned.split("-");
      if (!year || !month || !day) return cleaned;
      return `${year}년 ${Number(month)}월 ${Number(day)}일`;
    }

    function formatMonthLabel(value) {
      if (!value) return "-";
      const [year, month] = String(value).split("-");
      if (!year || !month) return String(value);
      return `${year}년 ${Number(month)}월`;
    }

    function formatDateTimeLabel(value) {
      if (!value) return "-";
      const normalized = String(value).replace(" ", "T");
      const date = new Date(normalized);
      if (Number.isNaN(date.getTime())) {
        const [datePart, timePart = ""] = normalized.split("T");
        const [year, month, day] = datePart.split("-");
        const [hour = "00", minute = "00"] = timePart.split(":");
        if (!year || !month || !day) return normalized;
        return `${year}년 ${Number(month)}월 ${Number(day)}일 ${hour}:${minute}`;
      }
      return `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일 ${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
    }

    function isValidNumber(value) {
      return Number.isFinite(value);
    }

    function compareText(current, previous) {
      if (!isValidNumber(current) || !isValidNumber(previous) || previous === 0) return "전주 비교 불가";
      const diff = current - previous;
      const ratio = diff / previous;
      const sign = diff > 0 ? "+" : "";
      return `전주 대비 ${sign}${(ratio * 100).toFixed(1)}%`;
    }

    function card(label, value, sub) {
      return `<div class="card"><div class="label">${label}</div><div class="value">${value}</div><div class="sub">${sub || ""}</div></div>`;
    }

    function weekLabel(index, row) {
      return `${index + 1}주차`;
    }

    function makeLegend(el, items) {
      el.innerHTML = items.map((item) => `<span><i class="swatch" style="background:${item.color}"></i>${item.label}</span>`).join("");
    }

    function buildDatasets(series) {
      return series.map((item) => ({
        label: item.label,
        data: item.values.map((value) => isValidNumber(value) ? value : null),
        type: item.type || "line",
        borderColor: item.color,
        backgroundColor: item.fillColor || item.color,
        borderWidth: item.type === "bar" ? 1 : 3,
        pointRadius: item.type === "bar" ? 0 : 2,
        pointHoverRadius: item.type === "bar" ? 0 : 4,
        tension: item.type === "bar" ? 0 : 0.28,
        spanGaps: true,
        borderSkipped: item.type === "bar" ? false : undefined,
        barPercentage: item.type === "bar" ? 0.72 : undefined,
        categoryPercentage: item.type === "bar" ? 0.86 : undefined,
        order: item.order || 0,
        yAxisID: item.axis || "y"
      }));
    }

    function renderChart(canvasId, labels, series, options = {}) {
      const canvas = document.getElementById(canvasId);
      if (chartRegistry[canvasId]) chartRegistry[canvasId].destroy();
      chartRegistry[canvasId] = new Chart(canvas, {
        type: "line",
        data: { labels, datasets: buildDatasets(series) },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const raw = ctx.raw;
                  if (!isValidNumber(raw)) return `${ctx.dataset.label}: -`;
                  return `${ctx.dataset.label}: ${formatNumber(raw)}`;
                }
              }
            }
          },
          scales: {
            x: {
              stacked: !!options.stacked,
              grid: { color: "#edf1ec" },
              ticks: { color: "#738078", maxTicksLimit: 8 }
            },
            y: {
              stacked: !!options.stacked,
              grid: { color: "#e4e9e2" },
              ticks: { color: "#738078", callback: (value) => formatNumber(value) }
            },
            y1: options.secondaryAxis ? {
              position: "right",
              grid: { drawOnChartArea: false },
              ticks: { color: "#738078", callback: (value) => formatNumber(value) }
            } : undefined
          }
        }
      });
    }

    function render() {
      const weeklyAll = data.weekly.filter((item) => item.week_start);
      const monthKeys = [...new Set(weeklyAll.map((item) => String(item.week_start).split("T")[0].slice(0, 7)))];
      const yearSelect = document.getElementById("yearSelect");
      const monthSelect = document.getElementById("monthSelect");
      const years = [...new Set(monthKeys.map((key) => key.slice(0, 4)))];
      const latestMonthKey = monthKeys[monthKeys.length - 1];
      const latestYear = latestMonthKey.slice(0, 4);

      yearSelect.innerHTML = years.map((year) => `<option value="${year}" ${year === latestYear ? "selected" : ""}>${year}년</option>`).join("");

      function monthOptionsForYear(year) {
        return monthKeys.filter((key) => key.startsWith(year));
      }

      function renderSelectedMonth() {
        const selectedMonthKey = monthSelect.value;
        const rows = weeklyAll.filter((item) => String(item.week_start).split("T")[0].startsWith(selectedMonthKey));
        const latest = rows[rows.length - 1];
        const previous = rows.length > 1 ? rows[rows.length - 2] : null;
        if (!latest) return;

        document.getElementById("selectionHint").textContent = `${formatMonthLabel(selectedMonthKey)} 데이터만 표시합니다.`;
        document.getElementById("meta").innerHTML = `
          선택 월: <strong>${formatMonthLabel(selectedMonthKey)}</strong><br />
          최신 주 기준: <strong>${formatDateLabel(latest.week_start)}</strong>${latest.week_end ? ` ~ ${formatDateLabel(latest.week_end)}` : ""}<br />
          생성 시각: <strong>${formatDateTimeLabel(data.generatedAt)}</strong>
        `;

        document.getElementById("summaryGrid").innerHTML = [
          card("주간 원거래 금액", formatNumber(latest.gross_transaction), compareText(latest.gross_transaction, previous?.gross_transaction)),
          card("주간 매출", formatNumber(latest.sales_net), compareText(latest.sales_net, previous?.sales_net)),
          card("주간 사용 포인트", formatNumber(latest.points_used), compareText(latest.points_used, previous?.points_used)),
          card("주간 DAU", formatNumber(latest.dau), compareText(latest.dau, previous?.dau)),
          card("주간 회원가입", formatNumber(latest.signups), compareText(latest.signups, previous?.signups)),
          card("주간 결제 회원 수", formatNumber(latest.payers), compareText(latest.payers, previous?.payers))
        ].join("");

        makeLegend(document.getElementById("weeklyLegend"), [
          { label: "원거래 금액", color: "#165d4a" },
          { label: "매출", color: "#d97706" },
          { label: "사용 포인트", color: "#7c3aed" }
        ]);
        renderChart("weeklyMonthChart", rows.map((row, index) => weekLabel(index, row)), [
          {
            label: "원거래 금액",
            type: "bar",
            color: "#165d4a",
            fillColor: "rgba(22, 93, 74, 0.72)",
            values: rows.map((row) => row.gross_transaction),
            order: 1
          },
          {
            label: "매출",
            color: "#d97706",
            values: rows.map((row) => row.sales_net),
            order: 0
          },
          {
            label: "사용 포인트",
            color: "#7c3aed",
            values: rows.map((row) => row.points_used),
            axis: "y1",
            order: 0
          }
        ], { secondaryAxis: {} });

        document.getElementById("monthTables").innerHTML = `
          <details open>
            <summary>${formatMonthLabel(selectedMonthKey)} 주차별 상세</summary>
            <div class="year-table-wrap">
              <table class="mini-table">
                <thead>
                  <tr>
                    <th>주차</th>
                    <th>시작일</th>
                    <th>원거래 금액</th>
                    <th>매출</th>
                    <th>포인트</th>
                    <th>DAU</th>
                    <th>회원가입</th>
                    <th>결제 회원</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows.map((row, index) => `
                    <tr>
                      <td>${weekLabel(index, row)}</td>
                      <td>${formatDateLabel(row.week_start)}</td>
                      <td>${formatNumber(row.gross_transaction)}</td>
                      <td>${formatNumber(row.sales_net)}</td>
                      <td>${formatNumber(row.points_used)}</td>
                      <td>${formatNumber(row.dau)}</td>
                      <td>${formatNumber(row.signups)}</td>
                      <td>${formatNumber(row.payers)}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </details>
        `;
      }

      function syncMonths(year, preferredMonth = null) {
        const options = monthOptionsForYear(year);
        monthSelect.innerHTML = options.map((monthKey) => {
          const monthNum = monthKey.slice(5, 7);
          const selected = monthKey === (preferredMonth && options.includes(preferredMonth) ? preferredMonth : options[options.length - 1]);
          return `<option value="${monthKey}" ${selected ? "selected" : ""}>${Number(monthNum)}월</option>`;
        }).join("");
        renderSelectedMonth();
      }

      yearSelect.addEventListener("change", (event) => syncMonths(event.target.value));
      monthSelect.addEventListener("change", renderSelectedMonth);
      syncMonths(latestYear, latestMonthKey);
    }

    render();
  </script>
</body>
</html>
