<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모두의충전 대시보드</title>
  <style>
    :root {
      --paper: #f8f8f3;
      --bg: #eef3ec;
      --panel: #ffffff;
      --ink: #18261d;
      --muted: #647067;
      --line: #d7ddd4;
      --accent: #165d4a;
      --accent-soft: #d8efe5;
      --shadow: 0 18px 40px rgba(24, 38, 29, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 28px 18px 60px;
      color: var(--ink);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(22, 93, 74, 0.12), transparent 24%),
        linear-gradient(180deg, #f9fbf8 0%, #edf3ee 100%);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-flex;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }

    h1 {
      margin: 14px 0 8px;
      font-size: 34px;
      line-height: 1.15;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin-top: 24px;
    }

    .card {
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 10px 24px rgba(24, 38, 29, 0.05);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .card p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 132px;
      padding: 12px 16px;
      border-radius: 14px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">Modu Charge Dashboard</div>
    <h1>모두의충전 대시보드</h1>
    <p class="lead">월간 분석과 주간 분석을 따로 볼 수 있게 분리했습니다. 필요한 화면으로 바로 들어가서 보시면 됩니다.</p>

    <div class="grid">
      <section class="card">
        <h2>월간 대시보드</h2>
        <p>DAU, MAU, Stickiness, 퍼널, 결제 규모, 데이터 품질 이슈를 월 단위 흐름으로 봅니다.</p>
        <a class="link" href="./modu_charge_dashboard_monthly.html">월간 보기</a>
      </section>

      <section class="card">
        <h2>주간 대시보드</h2>
        <p>최근 주차별 원거래 금액, 매출, 사용 포인트, 발급/가입/결제 흐름을 빠르게 점검합니다.</p>
        <a class="link" href="./modu_charge_dashboard_weekly.html">주간 보기</a>
      </section>
    </div>
  </main>
</body>
</html>
