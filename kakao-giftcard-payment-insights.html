<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리포트 이동</title>
  <meta http-equiv="refresh" content="0; url=./giftcard/" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f3ea;
      color: #1f2937;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .card {
      max-width: 520px;
      padding: 28px 32px;
      border-radius: 20px;
      border: 1px solid #ddd6c8;
      background: #fffdf8;
      box-shadow: 0 18px 50px rgba(31, 41, 55, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    p {
      margin: 0;
      color: #6b7280;
      line-height: 1.7;
    }

    a {
      color: #b45309;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>카카오 상품권 전환 리포트로 이동합니다</h1>
    <p>
      새 경로는 <a href="./giftcard/">`/giftcard/`</a> 입니다.
      자동으로 이동하지 않으면 링크를 눌러주세요.
    </p>
  </main>
</body>
</html>
